<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>🎀𝐌𝐚𝐬𝐬𝐚𝐠𝐞 𝐭𝐨 𝐌𝐲 𝐖𝐨𝐫𝐥𝐝🎀/title>
        <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
          <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                          font-family: 'Amiri', 'Cairo', sans-serif;
                                background: linear-gradient(135deg, #ff4d6d, #ff99ac);
                                      color: #fff;
                                            overflow-x: hidden;
                                                  line-height: 2;
                                                        transition: filter 1s ease;
                  }
                      header {
                              text-align: center;
                                    padding: 50px 20px 20px;
                                          opacity: 0;
                                                transform: translateY(-30px);
                                                      animation: fadeSlideDown 2s forwards ease;
                                                            animation-delay: 3.2s;
                      }
                          header h1 {
                                  font-size: 3rem;
                                        font-weight: bold;
                                              text-shadow: 0 0 15px rgba(255, 0, 85, 0.7);
                          }
                              .message-box {
                                      max-width: 900px;
                                            margin: 40px auto;
                                                  padding: 30px;
                                                        background: rgba(255, 255, 255, 0.15);
                                                              border-radius: 25px;
                                                                    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                                                                          backdrop-filter: blur(10px);
                                                                                font-size: 1.3rem;
                                                                                      text-align: right;
                                                                                            overflow-y: auto;
                                                                                                  max-height: 70vh;
                                                                                                        opacity: 0;
                                                                                                              transform: translateY(30px);
                                                                                                                    animation: fadeSlideUp 2.5s forwards ease;
                                                                                                                          animation-delay: 4s;
                              }
                                  @keyframes fadeSlideUp {
                                          to { opacity: 1; transform: translateY(0); }
                                  }
                                      @keyframes fadeSlideDown {
                                              to { opacity: 1; transform: translateY(0); }
                                      }
                                          .heart {
                                                  position: fixed;
                                                        top: -10px;
                                                              color: #ffdde1;
                                                                    font-size: 22px;
                                                                          animation: fall linear forwards;
                                                                                z-index: 1;
                                          }
                                              @keyframes fall {
                                                      0% { transform: translateY(-10px) scale(1); opacity: 1; }
                                                            100% { transform: translateY(110vh) scale(1.5); opacity: 0; }
                                              }
                                                  footer {
                                                          text-align: center;
                                                                padding: 20px;
                                                                      font-size: 1rem;
                                                                            color: #ffe6ea;
                                                                                  opacity: 0;
                                                                                        transform: translateY(20px);
                                                                                              animation: fadeSlideUp 2s forwards ease;
                                                                                                    animation-delay: 5s;
                                                  }
                                                      button {
                                                              margin: 10px;
                                                                    padding: 10px 25px;
                                                                          border: none;
                                                                                border-radius: 20px;
                                                                                      font-size: 1.1rem;
                                                                                            background: #fff;
                                                                                                  color: #ff4d6d;
                                                                                                        cursor: pointer;
                                                                                                              transition: 0.3s;
                                                      }
                                                          button:hover {
                                                                  background: #ff4d6d;
                                                                        color: #fff;
                                                          }

                                                              /* شاشة التحميل */
                                                                  #loader {
                                                                          position: fixed;
                                                                                top: 0; left: 0;
                                                                                      width: 100%; height: 100%;
                                                                                            background: linear-gradient(135deg, #ff4d6d, #ff99ac);
                                                                                                  display: flex;
                                                                                                        justify-content: center;
                                                                                                              align-items: center;
                                                                                                                    flex-direction: column;
                                                                                                                          z-index: 9999;
                                                                  }
                                                                      #loader h2 {
                                                                              font-size: 2.5rem;
                                                                                    color: #fff;
                                                                                          text-shadow: 0 0 15px rgba(255,255,255,0.7);
                                                                                                animation: pulse 1.5s infinite;
                                                                      }
                                                                          @keyframes pulse {
                                                                                  0%, 100% { transform: scale(1); opacity: 1; }
                                                                                        50% { transform: scale(1.2); opacity: 0.7; }
                                                                          }
                                                                              .loader-heart {
                                                                                      font-size: 2rem;
                                                                                            color: #fff;
                                                                                                  animation: bounce 1.5s infinite;
                                                                              }
                                                                                  @keyframes bounce {
                                                                                          0%, 100% { transform: translateY(0); }
                                                                                                50% { transform: translateY(-15px); }
                                                                                  }
                                                                                    </style>
                                                                                    </head>
                                                                                    <body>
                                                                                      <!-- شاشة التحميل -->
                                                                                        <div id="loader">
                                                                                            <div class="loader-heart">R🤍💍️</div>
                                                                                                <h2>I LOVE YOU</h2>
                                                                                                  </div>

                                                                                                    <header>
                                                                                                        <h1> 𝐈 𝐥𝐨𝐯𝐞 𝐮 🤍. </h1>
                                                                                                          </header>

                                                                                                            <!-- موسيقى خلفية -->
                                                                                                              <audio id="bgMusic" loop>
                                                                                                                  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
                                                                                                                    </audio>

                                                                                                                      <div class="message-box" id="messageBox">
                                                                                                                          <p>
                                                                                                                                يحياتي انا من يوم ما عرفتك وأنا مش نفس الشخص اللي كنت قبل كده حياتي بقت ليها معنى جديد معنى عمري ما جربته قبل كده يمكن ناس كتير تحكي عن الحب وتوصفه بكلام كبير لكن أنا مش محتاج أوصفه بكلام معقد أنا ببساطة عايش الحب ده معاكي يوم بيوم دقيقة بدقيقة نفس ورا نفس أنا مبقتش شايف حاجة في الدنيا كلها غيرك إنتي مبقتش بحلم بحاجة غير بيكي مبقتش بفكر في أي حاجة غير إني أعيش اللحظة اللي هشوفك فيها قدامي
النهاردة بمرور شهرين على علاقتنا حاسس إن دول أطول شهرين وأجمل شهرين عشتهم في حياتي من غير ما أشوفك ومن غير ما ألمسك ومن غير ما أحس بإيدي في إيدك بس والله يا روحي كأني عايش معاكي من سنين كأني أعرفك من أول يوم في عمري كأني اتولدت مخصوص عشان أوصلك وأعيش العمر كله جمبك وأكون السبب في ضحكتك
أنا كل يوم بصحى على أمل جديد أمل إني أقرب منك أكتر أمل إني أشوفك أمل إني أحضنك أمل إني أعيش اللحظة اللي ربنا هيجمعنا فيها اللحظة اللي هبص فيها لعينيكي وأشوف فيها روحي كلها اللحظة اللي هعرف فيها معنى كلمة بيت معنى كلمة وطن معنى كلمة حب حقيقي لأن إنتي بالنسبالي مش مجرد حب إنتي حياتي كلها.
عيد ميلادك بالنسبة ليا مش مناسبة عادية ولا يوم زي أي يوم تاني عيد ميلادك هو اليوم اللي ربنا قرر فيه ينزل للدنيا ملاك على هيئة إنسانة اليوم اللي الدنيا نورت فيه وبدأت تستعد تستقبل أطيب وأجمل قلب موجود على الأرض عيد ميلادك بالنسبالي هو يوم ميلاد قلبي أنا كمان يوم ميلاد حياتي اللي ابتدت من أول ما عرفتك يوم ميلاد الأمل اللي رجعلي تاني بعد ما كنت فاقده
أنا بكتب الرسالة دي ومش قادر أوصف قد إيه أنا فرحان بيكي فرحان إنك في حياتي فرحان إني بعيش إحساس الناس كلها بتتمنى تعيشه إحساس الحب الصادق النضيف اللي مفيهوش تمثيل ولا خداع ولا أي حاجة تانية غير إن اتنين بيحبوا بعض بصدق
يا حبيبتي يمكن إحنا لسه ماشفناش بعض ولسه ما اتقابلناش لكن والله العظيم أنا حاسس إنك معايا في كل لحظة أنا بتخيلك وأنا ماشي في الشارع بتخيل ضحكتك في كل مكان بروحه بتخيل وجودك جمبي وأنا قاعد لوحدي بتخيل كلامك وهو بيرن في وداني حتى وأنا نايم بلاقيكي في أحلامي يعني إنتي مش غايبة عني لحظة
إنتي بتمثليلي الحلم اللي طول عمري مستنيه الحلم اللي كنت فاكر إنه صعب يتحقق بس لما عرفتك فهمت إن مفيش حاجة صعبة وإن ربنا بيدينا اللي نستحقه في الوقت الصح وأنا كنت مستنيكي طول حياتي ولقيتك في الوقت اللي كنت محتاجلك فيه
كل سنة وإنتي طيبة يا عمري كل سنة وإنتي أجمل حاجة حصلتلي في حياتي كل سنة وأنا شايف حبنا بيكبر يوم بعد يوم لحظة بعد لحظة كل سنة وإنتي النور اللي بينورلي الطريق كل سنة وإنتي السبب في سعادتي والضحكة اللي على وشي
أنا عاوزك تعرفي إنك بالنسبالي أهم من أي حاجة في الدنيا دي أهم من نفسي أهم من أحلامي أهم من أي شيء تاني لأنك إنتي بجد الحلم نفسه إنتي الحلم اللي أنا عايش عشانه إنتي السبب اللي مخليني أحب الدنيا وأشوفها أحلى حتى وهي صعبة حتى وهي مليانة مشاكل
أنا نفسي اليوم ده ييجي بسرعة اليوم اللي هنحتفل فيه بعيد ميلادك وإحنا مع بعض مش بالكلام ولا بالمسجات ولا بالصور اليوم اللي هجيبلك فيه هدية من قلبي قبل ما أجيبلك أي حاجة تانية اليوم اللي هقعد فيه قصادك وأقولك كل الكلام ده من غير كتابة ومن غير شاشة اليوم اللي هبص فيه لعينيكي وأقولك بحبك وحاسس قد إيه إن ربنا كرمني بيكي
أنا عارف إن الحياة مش سهلة وعارف إن البعد صعب لكن أنا مصدق إن حبنا ده أكبر من أي مسافة أكبر من أي وقت أكبر من أي صعوبة عارف إننا هنكمل وهنفضل مع بعض عارف إن اليوم اللي هنشوف بعض فيه مش بعيد وإنه هيبقى بداية لحياة مليانة حب وراحة ودفا
أنا بوعدك إنك عمرك ما هتحسي إنك لوحدك طول ما أنا موجود في حياتك وبوعدك إنك عمرك ما هتعيشي يوم من غير ما تلاقي حنية وحب واهتمام وبوعدك إني هبقى سندك وظهرك وبيتك اللي ترجعي له في أي وقت بوعدك إني أفرحك وأضحكك وأمسح دموعك وأكون كل حاجة إنتي محتاجاها
وبوعدك كمان إنك عمرك ما هتعيشي عيد ميلاد من غير ما تكوني أسعد إنسانة في الدنيا حتى لو بعيد عنك أنا هخليكي تحسي إن العالم كله بيحتفل بيكي وإن حياتي كلها بتتهدى ليكي
يا حبيبتي أنا مش بكتب كلام عشان يبقى شكله حلو أنا بكتب إحساسي الحقيقي بكتب اللي قلبي عايز يقولهولك بكتب اللي مش قادر أكتمه جوايا بكتب اللي أنا عايشه كل يوم معاك حتى وإحنا بعيد

بحبك .
                                                                                                                                                                        </p>
                                                                                                                                                                          </div>

                                                                                                                                                                            <div style="text-align:center;">
                                                                                                                                                                                <button onclick="scrollMessage()">📜𝐑𝐞𝐚𝐝 𝐚 𝐟𝐮𝐥𝐥 𝐌𝐞𝐬𝐬𝐚𝐠𝐞📜</button>
                                                                                                                                                                                    <button onclick="toggleMusic()">🎶𝐎𝐧/𝐨𝐟𝐟 𝐦𝐮𝐬𝐢𝐜🎶</button>
                                                                                                                                                                                      </div>

                                                                                                                                                                                        <footer>
                                                                                                                                                                                            <p>🤍🎀</p>
                                                                                                                                                                                              </footer>

                                                                                                                                                                                                <script>
                                                                                                                                                                                                    // قلوب متساقطة
                                                                                                                                                                                                        function createHeart() {
                                                                                                                                                                                                                  const heart = document.createElement("div");
                                                                                                                                                                                                                        heart.classList.add("heart");
                                                                                                                                                                                                                              heart.innerHTML = "R";
                                                                                                                                                                                                                                    heart.style.left = Math.random() * 100 + "vw";
                                                                                                                                                                                                                                          heart.style.animationDuration = (4 + Math.random() * 5) + "s";
                                                                                                                                                                                                                                                document.body.appendChild(heart);
                                                                                                                                                                                                                                                      setTimeout(() => heart.remove(), 9000);
                                                                                                                                                                                                        }
                                                                                                                                                                                                            setInterval(createHeart, 400);

                                                                                                                                                                                                                // زرار القراءة
                                                                                                                                                                                                                    function scrollMessage() {
                                                                                                                                                                                                                              const box = document.getElementById('messageBox');
                                                                                                                                                                                                                                    box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
                                                                                                                                                                                                                    }

                                                                                                                                                                                                                        // زرار الموسيقى
                                                                                                                                                                                                                            function toggleMusic() {
                                                                                                                                                                                                                                      const music = document.getElementById('bgMusic');
                                                                                                                                                                                                                                            if (music.paused) {
                                                                                                                                                                                                                                                        music.play();
                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                        music.pause();
                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                // شاشة التحميل + تشغيل الموسيقى
                                                                                                                                                                                                                                    window.addEventListener("load", () => {
                                                                                                                                                                                                                                              const loader = document.getElementById("loader");
                                                                                                                                                                                                                                                    setTimeout(() => {
                                                                                                                                                                                                                                                                loader.style.opacity = "0";
                                                                                                                                                                                                                                                                        document.body.style.filter = "blur(10px)";
                                                                                                                                                                                                                                                                                setTimeout(() => {
                                                                                                                                                                                                                                                                                              loader.style.display = "none";
                                                                                                                                                                                                                                                                                                        document.body.style.filter = "blur(0px)";
                                                                                                                                                                                                                                                                                                                  autoPlayMusic();
                                                                                                                                                                                                                                                                                }, 1000);
                                                                                                                                                                                                                                                    }, 3000); // ⏳ تأخير 3 ثواني
                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                        // محاولة تشغيل الموسيقى تلقائياً
                                                                                                                                                                                                                                            function autoPlayMusic() {
                                                                                                                                                                                                                                                      const music = document.getElementById("bgMusic");
                                                                                                                                                                                                                                                            music.play().catch(() => {
                                                                                                                                                                                                                                                                        document.addEventListener("click", () => {
                                                                                                                                                                                                                                                                                      music.play();
                                                                                                                                                                                                                                                                        }, { once: true });
                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                              </script>
                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                              </html>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   })
